# ############# Themes #############
env = QT_QPA_PLATFORMTHEME, gtk
env = QT_STYLE_OVERRIDE, adwaita-dark
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = XCURSOR_THEME, $cursorTheme
env = XCURSOR_SIZE, $cursorSize

# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# Caelestia local paths (~/.local installation)
env = QML_IMPORT_PATH, $HOME/.local/lib/qt6/qml
env = QT_PLUGIN_PATH, $HOME/.local/lib/qt6/plugins
env = CAELESTIA_LIB_DIR, $HOME/.local/lib/caelestia

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1
